[backend]
[backend.training]
python_bin = 'python'
train_script = 'fsd_trainer/src/gta_fsd/train.py'
jobs_dir = 'S:\fsd_fivem_data\training_jobs'

[backend.actuator]
temporal_horizon_actuator_enabled = false
request_timeout = '500ms'
steering_gain = 1.0
throttle_gain = 1.0
throttle_floor = 0.0
speed_limit_kph = 17.0
overspeed_brake_margin_kph = 2.0
overspeed_brake = 0.25
model_brake_threshold = 0.55
reverse_lockout_speed_kph = 1.0
tick_hz = 15
url = 'http://127.0.0.1:8080'

[backend.translation]
steer_deadzone = 0.0
max_steer_scale = 1.0
steer_output_gain = 10.0
throttle_gain = 10.0
brake_gain = 1.0
brake_activation_threshold = 0.18
overspeed_brake_margin_mps = 0.75
brake_release_margin_mps = 0.20
brake_enter_hold_seconds = 0.18
throttle_hold_min = 0.12
throttle_ramp_up_per_second = 0.75
throttle_decay_per_second = 0.90
heading_deadband_deg = 2.5
heading_full_lock_deg = 45.0
low_speed_steer_gain = 1.35
high_speed_steer_gain = 0.75
steer_gain_fade_speed_mps = 5.0
steer_response_blend = 0.55
steer_command_rate_per_second = 4.0
target_speed_error_gain = 0.7
target_accel_gain = 0.25
longitudinal_deadband = 0.05
launch_throttle_min = 0.22
launch_speed_threshold = 1.0
launch_target_speed_margin = 0.75
max_target_speed_kph = 17.0
motion_confidence_on_threshold = 0.6
motion_confidence_off_threshold = 0.4
motion_hold_speed_max = 4.0
min_lateral_confidence = 0.05
min_longitudinal_confidence = 0.05

[backend.inference]
auto_load = true
dispatch_stride = 2
fps = 30
frame_height = 480
frame_width = 480
high_speed_steer_gain = 0.75
low_speed_steer_gain = 1.35
jpeg_quality = 90
launch_speed_threshold = 1.0
launch_target_speed_margin = 0.75
launch_throttle_min = 0.22
max_target_speed_kph = 17.0
model_device = 'cuda'
model_server_url = 'http://127.0.0.1:8090'
request_timeout = '5s'
inference_timeout = '250ms'
alignment_tolerance = '125ms'
source_id = 'monitor-2'
steer_gain_fade_speed_mps = 5.0
steer_command_rate_per_second = 4.0
steer_response_blend = 0.55
target_speed_deadband = 0.05
target_speed_error_gain = 0.7

[dataset]
data_root = 'S:\fsd_fivem_data'
future_speed_delta_clip = 2.0
future_speed_delta_normalize = true
image_height = 480
image_width = 480
window_size = 5
image_offsets = [-8, -6, -4, -2, 0]
label_tolerance = '100ms'
telemetry_offsets = [-8, -7, -6, -5, -4, -3, -2, -1, 0]
future_offsets = [1, 2, 3, 4, 5, 6]
telemetry_feature_names = ['current_speed', 'yaw_sin', 'yaw_cos', 'yaw_rate', 'steering', 'acceleration']
control_target_names = ['steering', 'acceleration', 'brakePressureAvg']
aux_target_names = ['future_speed', 'future_speed_delta', 'future_yaw_delta', 'future_yaw_rate']
frame_stride = 2
sample_stride = 10
sync_flash_brightness_threshold = 245.0
sync_flash_frame_limit = 90
train_run_ids = [
    '2026-04-26_02-12-44AM_xajfyj',
    '2026-04-26_03-19-34AM_j4oafm'
]
val_run_ids = [
    '2026-04-26_01-50-52AM_d6hpum'
]

[dataset.target_transforms]
[dataset.target_transforms.steering]
type = 'signed_cap'
clip = 1.0

[dataset.target_transforms.acceleration]
type = 'signed_cap'
clip = 1.0

[dataset.target_transforms.brakePressureAvg]
type = 'positive_cap'
clip = 1.0

[dataset.target_transforms.future_speed]
type = 'positive_cap'
clip = 80.0

[dataset.target_transforms.future_speed_delta]
type = 'signed_cap'
clip = 2.0

[dataset.target_transforms.future_yaw_delta]
type = 'angle_cap'
clip = 45.0

[dataset.target_transforms.future_yaw_rate]
type = 'signed_cap'
clip = 10.0

[inference]
checkpoint = 'fsd_trainer/training_runs/run-20260422-043856/epoch-010.pt'
data_root = 'S:\fsd_fivem_data'
device = 'cuda'
output_json = false
run_id = '2026-04-14_08-17-23AM_ym5rls'
sample_index = 400

[loader]
cpu_batch_size = 34
log_every_n_batches = 10
train_batch_size = 15
train_num_workers = 8
train_persistent_workers = false
train_pin_memory = true
train_prefetch_factor = 1
val_batch_size = 15
val_num_workers = 8
val_persistent_workers = false
val_pin_memory = false
val_prefetch_factor = 1
val_split = 1.0

[loader.turn_oversampling]
enabled = true
straight_weight = 0.4
light_turn_weight = 2.5
medium_turn_weight = 1.5
sharp_turn_weight = 0.4
light_turn_threshold = 0.05
medium_turn_threshold = 0.15
sharp_turn_threshold = 0.30

[output]
base_dir = 'S:\fsd_fivem_data\training_runs'

[model]
width_multiplier = 1.5
telemetry_hidden_dim = 128
dropout = 0.10

[model.visual_temporal]
enabled = true
type = 'gru'
hidden_dim = 256
num_layers = 1
bidirectional = false
dropout = 0.0

[model.horizon_decoder]
enabled = true
horizon_embed_dim = 32
hidden_dim = 256
num_layers = 2
dropout = 0.10

[state_inputs.route_direction_unknown]
enabled = true

[state_inputs.route_direction_keep_straight]
enabled = true

[state_inputs.route_direction_turn_left]
enabled = true

[state_inputs.route_direction_turn_right]
enabled = true

[state_inputs.route_direction_reroute_wrong_way]
enabled = true

[training]
device = 'auto'
early_stopping_metric = 'drive_score'
early_stopping_min_delta = 0.0
early_stopping_patience = 6
epochs = 150
learning_rate = 0.0005
loss_function = 'smooth_l1'
smooth_l1_beta = 0.1
aux_loss_weight = 0.4
horizon_loss_weights = [1.0, 0.9, 0.8, 0.5, 0.8, 1.0]

[training.optimizer]
name = 'adamw'
lr = 0.0005
weight_decay = 0.0001
grad_clip_norm = 1.0

[training.scheduler]
name = 'cosine'
warmup_fraction = 0.05
min_lr_ratio = 0.05

[training.ema]
enabled = true
decay = 0.999

[training.target_loss_weights]
steering = 2.5
acceleration = 3.9
brakePressureAvg = 2.5
future_speed = 1.8
future_speed_delta = 1.5
future_yaw_delta = 1.3
future_yaw_rate = 1.0
