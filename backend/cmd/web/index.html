<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Run Control</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #0f172a;
            --bg-soft: #111827;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-strong: rgba(9, 14, 25, 0.96);
            --text: #e5eefb;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.16);
            --accent: #38bdf8;
            --accent-strong: #2563eb;
            --success: #16a34a;
            --warn: #d97706;
            --danger: #dc2626;
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Sora", "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top center, rgba(56, 189, 248, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.12), transparent 24%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
        }

        .shell {
            width: min(1040px, calc(100% - 32px));
            margin: 32px auto;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 24%),
                rgba(15, 23, 42, 0.92);
            box-shadow: var(--shadow);
        }

        .hero {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--muted);
        }

        .brand-mark {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 0 0 8px rgba(56, 189, 248, 0.08);
        }

        .eyebrow {
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.02;
            font-weight: 600;
            max-width: 12ch;
        }

        .lead {
            margin: 0;
            max-width: 62ch;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.5), transparent 60%);
            pointer-events: none;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 22px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .status-item {
            padding: 14px;
            border-radius: 12px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            min-height: 92px;
        }

        .status-label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .status-value {
            font-size: 18px;
            line-height: 1.3;
            font-weight: 500;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 14px;
            border: 1px solid var(--line);
            background: #0f172a;
        }

        .pill::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--warn);
        }

        .pill.ok::before {
            background: var(--success);
        }

        .pill.bad::before {
            background: var(--danger);
        }

        .controls {
            display: grid;
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--muted);
        }

        select, button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--line);
            font: inherit;
        }

        select {
            padding: 14px 16px;
            background: #0b1220;
            color: var(--text);
            appearance: none;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            padding: 14px 16px;
            cursor: pointer;
            background: #162033;
            color: var(--text);
            transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
            font-weight: 600;
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #eff6ff;
            border-color: transparent;
        }

        button.secondary {
            background: #162033;
        }

        button.danger {
            background: rgba(220, 38, 38, 0.12);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.24);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.65;
            transform: none;
        }

        .queue {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .queue li {
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            display: grid;
            gap: 4px;
        }

        .queue strong {
            display: block;
            margin-bottom: 4px;
        }

        .muted {
            color: var(--muted);
        }

        .banner {
            min-height: 24px;
            font-size: 14px;
            color: var(--muted);
        }

        .banner.error {
            color: var(--danger);
        }

        .banner.success {
            color: var(--success);
        }

        @media (max-width: 800px) {
            .shell {
                width: min(100% - 20px, 1040px);
                margin: 10px auto;
                padding: 18px;
                border-radius: 22px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .status-grid,
            .button-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="topbar">
        <div class="brand">
            <span class="brand-mark"></span>
            <span>Local Scene Control</span>
        </div>
        <div id="fivem-status"></div>
    </section>

    <section class="hero">
        <span class="eyebrow">FiveM Local Control</span>
        <h1>Run scenes from the browser.</h1>
        <p class="lead">
            Queue local scene commands, let the FiveM server poll them, and keep capture on the same path you already built.
        </p>
    </section>

    <section class="layout">
        <article class="card">
            <h2>Control Panel</h2>
            <div class="controls">
                <div class="field">
                    <label for="scene-select">Scene</label>
                    <select id="scene-select"></select>
                </div>
                <div class="button-grid">
                    <button id="start-scene" class="primary">Start Selected Scene</button>
                    <button id="run-all" class="secondary">Run All Scenes</button>
                    <button id="end-scene" class="danger">End Scene</button>
                    <button id="end-all" class="danger">End All Scenes</button>
                </div>
                <div id="banner" class="banner" aria-live="polite"></div>
            </div>
        </article>

        <article class="card">
            <h2>Live State</h2>
            <div class="status-grid">
                <div class="status-item">
                    <span class="status-label">Runtime</span>
                    <div id="runtime-status" class="status-value"></div>
                </div>
                <div class="status-item">
                    <span class="status-label">Active Scene</span>
                    <div id="active-scene" class="status-value"></div>
                </div>
                <div class="status-item">
                    <span class="status-label">Last Command</span>
                    <div id="last-command" class="status-value"></div>
                </div>
            </div>
        </article>
    </section>

    <section class="card">
        <h2>Queued Commands</h2>
        <ul id="queue" class="queue"></ul>
        <p id="queue-empty" class="muted">No queued commands.</p>
    </section>
</main>
<script type="module" src="/app.ts"></script>
</body>
</html>
